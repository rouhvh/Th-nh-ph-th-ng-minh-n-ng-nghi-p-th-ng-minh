<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-3" style="max-width:1100px;">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0 text-center" style="flex:1">Người quản lý / Giám sát</h3>
        <div class="ms-3">
          <button id="btn-stop" class="btn btn-danger me-2">Dừng xe</button>
          <button id="btn-start" class="btn btn-success">Khởi động lại</button>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="card mb-3">
            <div class="card-body text-center">
              <h5 class="card-title">Camera trực tiếp</h5>
              <div style="width:100%; border:1px solid #ddd; padding:4px; background:#000">
                <img id="live" src="/video_feed" style="width:100%; max-height:420px; object-fit:cover; display:block;" />
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Ảnh đã lưu</h5>
              <div id="images-list" class="d-flex flex-wrap gap-2"></div>
              <div id="images-empty" class="text-muted mt-2" style="display:none">Chưa có ảnh nào.</div>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title">Lịch sử cảnh báo</h5>
              <div id="events-list" style="max-height:60vh; overflow:auto;"></div>
              <div id="events-empty" class="text-muted mt-2" style="display:none">Chưa có sự kiện.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      async function fetchImages(){
        const res = await fetch('/api/images/list');
        const data = await res.json();
        const wrap = document.getElementById('images-list');
        wrap.innerHTML='';
        if(data.images && data.images.length){
          document.getElementById('images-empty').style.display='none';
          data.images.slice(0,20).forEach(img=>{
            const a = document.createElement('a');
            a.href = img.path;
            a.target = '_blank';
            const im = document.createElement('img');
            im.src = img.path;
            im.style.width='120px';
            im.style.border='1px solid #ccc';
            a.appendChild(im);
            wrap.appendChild(a);
          });
        } else {
          document.getElementById('images-empty').style.display='block';
        }
      }

      async function fetchEvents(){
        const res = await fetch('/api/events/drowsiness');
        const data = await res.json();
        const wrap = document.getElementById('events-list');
        wrap.innerHTML='';
        if(data.events && data.events.length){
          document.getElementById('events-empty').style.display='none';
          data.events.forEach(ev=>{
            const el = document.createElement('div');
            el.className='mb-2 p-2 border rounded';
            el.innerHTML = `<div><strong>${ev.timestamp || ev.time || ''}</strong> - ${ev.alert_level || ''}</div><div>${ev.image_path ? '<a href="/captures/'+ev.image_path.split('/').pop()+'" target="_blank">Ảnh</a>' : ''}</div>`;
            wrap.appendChild(el);
          });
        } else {
          document.getElementById('events-empty').style.display='block';
        }
        }
      }

      document.getElementById('btn-stop').addEventListener('click', async ()=>{
        await fetch('/api/vehicle/control', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({action:'stop'})});
        alert('Yêu cầu dừng xe đã gửi');
      });
      document.getElementById('btn-start').addEventListener('click', async ()=>{
        await fetch('/api/vehicle/control', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({action:'start'})});
        alert('Yêu cầu khởi động lại đã gửi');
      });

      fetchImages();
      fetchEvents();
      setInterval(fetchEvents, 5000);
    </script>
  </body>
</html>
